<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Logo Preview — Espacio Interior</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root { --primary: #5f7260; --sage: #e8ede8; --dark: #1c2320; --muted: #78716c; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #eceee9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      padding: 56px 24px;
    }
    .label { font-size: 10px; font-weight: 500; letter-spacing: .14em; text-transform: uppercase; color: #999; margin-bottom: 16px; text-align: center; }
    .card { border-radius: 20px; padding: 44px 60px; display: flex; flex-direction: column; align-items: center; gap: 36px; box-shadow: 0 2px 20px rgba(0,0,0,0.08); min-width: 360px; }
    .card.light { background: #faf9f7; }
    .card.sage  { background: var(--sage); }
    .card.dark  { background: var(--dark); }
    .logo { display: inline-flex; align-items: center; gap: 11px; color: var(--primary); }
    .logo.inv { color: #c8dac8; }
    .name { font-family: 'Playfair Display', serif; font-weight: 600; font-size: 20px; letter-spacing: -0.02em; color: inherit; }
    .sub { font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-top: 5px; }
    .logo.inv .sub { color: #7a9a7a; }
    .row { display: flex; align-items: center; gap: 36px; flex-wrap: wrap; justify-content: center; }
    .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .px { font-size: 10px; color: #bbb; }
    hr { width: 100%; border: none; border-top: 1px solid rgba(107,127,107,0.15); }
  </style>
</head>
<body>

  <!-- Reusable SVG snippet — same path data used at every size via viewBox scaling -->

  <!-- Light -->
  <div>
    <p class="label">Light — #faf9f7</p>
    <div class="card light">
      <div class="logo">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <line x1="9" y1="8" x2="9" y2="28" stroke="currentColor" stroke-width="3.0" stroke-linecap="round"/>
          <line x1="9" y1="8" x2="21" y2="8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
          <circle cx="11.8" cy="18" r="0.65" fill="currentColor" opacity="0.50"/>
          <circle cx="14.3" cy="18" r="0.90" fill="currentColor" opacity="0.60"/>
          <circle cx="16.9" cy="18" r="1.15" fill="currentColor" opacity="0.72"/>
          <circle cx="19.5" cy="18" r="1.40" fill="currentColor" opacity="0.84"/>
          <circle cx="22.1" cy="18" r="1.65" fill="currentColor" opacity="0.95"/>
          <line x1="9" y1="28" x2="21" y2="28" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
          <circle cx="30" cy="18" r="2.8" fill="currentColor"/>
        </svg>
        <div>
          <div class="name">Espacio Interior</div>
          <div class="sub">Terapia en Línea</div>
        </div>
      </div>
      <hr/>
      <div class="row">
        <div class="col">
          <div class="logo">
            <svg width="24" height="24" viewBox="0 0 36 36" fill="none">
              <line x1="9" y1="8" x2="9" y2="28" stroke="currentColor" stroke-width="3.0" stroke-linecap="round"/>
              <line x1="9" y1="8" x2="21" y2="8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
              <circle cx="11.8" cy="18" r="0.65" fill="currentColor" opacity="0.50"/>
              <circle cx="14.3" cy="18" r="0.90" fill="currentColor" opacity="0.60"/>
              <circle cx="16.9" cy="18" r="1.15" fill="currentColor" opacity="0.72"/>
              <circle cx="19.5" cy="18" r="1.40" fill="currentColor" opacity="0.84"/>
              <circle cx="22.1" cy="18" r="1.65" fill="currentColor" opacity="0.95"/>
              <line x1="9" y1="28" x2="21" y2="28" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
              <circle cx="30" cy="18" r="2.8" fill="currentColor"/>
            </svg>
            <span class="name" style="font-size:16px">Espacio Interior</span>
          </div>
          <span class="px">Header</span>
        </div>
        <div class="col">
          <svg width="48" height="48" viewBox="0 0 36 36" fill="none" style="color:var(--primary)">
            <line x1="9" y1="8" x2="9" y2="28" stroke="currentColor" stroke-width="3.0" stroke-linecap="round"/>
            <line x1="9" y1="8" x2="21" y2="8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
            <circle cx="11.8" cy="18" r="0.65" fill="currentColor" opacity="0.50"/>
            <circle cx="14.3" cy="18" r="0.90" fill="currentColor" opacity="0.60"/>
            <circle cx="16.9" cy="18" r="1.15" fill="currentColor" opacity="0.72"/>
            <circle cx="19.5" cy="18" r="1.40" fill="currentColor" opacity="0.84"/>
            <circle cx="22.1" cy="18" r="1.65" fill="currentColor" opacity="0.95"/>
            <line x1="9" y1="28" x2="21" y2="28" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
            <circle cx="30" cy="18" r="2.8" fill="currentColor"/>
          </svg>
          <span class="px">48px</span>
        </div>
        <div class="col">
          <svg width="72" height="72" viewBox="0 0 36 36" fill="none" style="color:var(--primary)">
            <line x1="9" y1="8" x2="9" y2="28" stroke="currentColor" stroke-width="3.0" stroke-linecap="round"/>
            <line x1="9" y1="8" x2="21" y2="8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
            <circle cx="11.8" cy="18" r="0.65" fill="currentColor" opacity="0.50"/>
            <circle cx="14.3" cy="18" r="0.90" fill="currentColor" opacity="0.60"/>
            <circle cx="16.9" cy="18" r="1.15" fill="currentColor" opacity="0.72"/>
            <circle cx="19.5" cy="18" r="1.40" fill="currentColor" opacity="0.84"/>
            <circle cx="22.1" cy="18" r="1.65" fill="currentColor" opacity="0.95"/>
            <line x1="9" y1="28" x2="21" y2="28" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
            <circle cx="30" cy="18" r="2.8" fill="currentColor"/>
          </svg>
          <span class="px">72px</span>
        </div>
        <div class="col">
          <svg width="16" height="16" viewBox="0 0 36 36" fill="none" style="color:var(--primary)">
            <line x1="9" y1="8" x2="9" y2="28" stroke="currentColor" stroke-width="3.0" stroke-linecap="round"/>
            <line x1="9" y1="8" x2="21" y2="8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
            <circle cx="11.8" cy="18" r="0.65" fill="currentColor" opacity="0.50"/>
            <circle cx="14.3" cy="18" r="0.90" fill="currentColor" opacity="0.60"/>
            <circle cx="16.9" cy="18" r="1.15" fill="currentColor" opacity="0.72"/>
            <circle cx="19.5" cy="18" r="1.40" fill="currentColor" opacity="0.84"/>
            <circle cx="22.1" cy="18" r="1.65" fill="currentColor" opacity="0.95"/>
            <line x1="9" y1="28" x2="21" y2="28" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
            <circle cx="30" cy="18" r="2.8" fill="currentColor"/>
          </svg>
          <span class="px">Favicon</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Sage -->
  <div>
    <p class="label">Sage — #e8ede8</p>
    <div class="card sage">
      <div class="logo">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <line x1="9" y1="8" x2="9" y2="28" stroke="currentColor" stroke-width="3.0" stroke-linecap="round"/>
          <line x1="9" y1="8" x2="21" y2="8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>

          <circle cx="30" cy="18" r="2.8" fill="currentColor"/>
        </svg>
        <div>
          <div class="name">Espacio Interior</div>
          <div class="sub">Terapia en Línea</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Dark -->
  <div>
    <p class="label">Dark — #1c2320</p>
    <div class="card dark">
      <div class="logo inv">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <line x1="9" y1="8" x2="9" y2="28" stroke="currentColor" stroke-width="3.0" stroke-linecap="round"/>
          <line x1="9" y1="8" x2="21" y2="8" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
          <circle cx="11.8" cy="18" r="0.65" fill="currentColor" opacity="0.50"/>

        <div>

  </div>

</body>
</html>
